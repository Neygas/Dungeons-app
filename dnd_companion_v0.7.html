function sheetInfo(c){const pb=profB(c.level);const rem=c.hitDiceTotal-c.hitDiceUsed;const isDown=c.hp<=0&&!c.isStable&&!c.isDead;return '<div class="stat-grid"><div class="stat-cell">'+(S.editMode?'<input class="stat-edit-input" type="number" value="'+c.ac+'" onchange="S.myChar.ac=+this.value;render()">':'<div class="stat-val">'+c.ac+'</div>')+'<div class="stat-lbl">Armor Class</div></div><div class="stat-cell">'+(S.editMode?'<input class="stat-edit-input" type="number" value="'+c.initiative+'" onchange="S.myChar.initiative=+this.value;render()">':'<div class="stat-val">'+fmtB(c.initiative)+'</div>')+'<div class="stat-lbl">Initiative</div></div><div class="stat-cell">'+(S.editMode?'<input class="stat-edit-input" type="number" value="'+c.speed+'" onchange="S.myChar.speed=+this.value;render()">':'<div class="stat-val">'+c.speed+'</div>')+'<div class="stat-lbl">Speed</div></div><div class="stat-cell"><div class="stat-val">'+c.passive+'</div><div class="stat-lbl">Passive WIS</div></div><div class="stat-cell"><div class="stat-val">+'+pb+'</div><div class="stat-lbl">Prof. Bonus</div></div><div class="stat-cell"><div class="stat-val">'+c.level+'</div><div class="stat-lbl">Level</div></div></div><div class="sec"><div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)"><div><div style="font-size:14px;font-weight:500">Inspiration</div><div class="muted" style="font-size:12px">Granted by DM</div></div><div class="insp-toggle '+(c.inspiration?'on':'')+'" onclick="S.myChar.inspiration=!S.myChar.inspiration;render();toast(S.myChar.inspiration?\'Inspiration gained\':\'Inspiration used\')"></div></div><div class="sec-hdr"><span class="sec-title">Rest</span></div><div class="rest-row"><button class="rest-btn" onclick="askShortRest()"><div>Short Rest</div><div class="rest-sub">Spend Hit Dice to recover HP</div></button><button class="rest-btn" onclick="askLongRest()"><div>Long Rest</div><div class="rest-sub">Restore all HP and spell slots</div></button></div><div class="sec-hdr"><span class="sec-title">Hit Dice</span></div><div class="hd-row"><div><div style="font-size:14px;font-weight:500">d'+(CLASS_HD[c.class]||8)+' Hit Die</div><div class="muted" style="margin-top:2px">'+rem+' of '+c.hitDiceTotal+' remaining</div></div><div style="display:flex;align-items:center;gap:8px">'+(S.editMode?'<button class="btn-icon minus" onclick="askAdjHd(-1)" '+(rem<=0?'disabled':'')+'>-</button><span class="hd-count">'+rem+'</span><button class="btn-icon" onclick="askAdjHd(1)" '+(c.hitDiceUsed<=0?'disabled':'')+'>+</button>':'<span class="hd-count" style="margin-right:4px">'+rem+'</span>')+'<button class="use-hd-btn" onclick="askUseHitDie()" '+(rem<=0||c.hp>=c.maxHp?'disabled':'')+'>Use Hit Die</button></div></div><div class="temp-row"><label>Temp HP</label><input class="temp-input" type="number" min="0" value="'+(c.tempHp||0)+'" oninput="S.myChar.tempHp=Math.max(0,+this.value||0);render()"><span class="muted" style="flex:1;font-size:12px">Absorbs damage first</span></div><div class="sec-hdr"><span class="sec-title">Death Saving Throws</span>'+(c.hp===0&&!c.isStable&&!c.isDead?'<button class="sec-act" onclick="S.myChar.isStable=true;S.myChar.deathSuccesses=0;S.myChar.deathFailures=0;render();toast(\'Stabilized\')">Mark Stable</button>':'')+'</div><div class="death-wrap"><div class="death-row" style="opacity:'+(isDown?1:.4)+';pointer-events:'+(isDown?'auto':'none')+'"><div class="death-lbl" style="color:var(--green)">Successes</div><div class="death-circles">'+[0,1,2].map(i=>'<div class="death-circle '+(i<c.deathSuccesses?'success':'')+'" onclick="toggleDeathSave(\'success\','+i+')">'+(i<c.deathSuccesses?'&#10003;':'')+'</div>').join('')+'</div></div><div class="death-row" style="opacity:'+(isDown?1:.4)+';pointer-events:'+(isDown?'auto':'none')+'"><div class="death-lbl" style="color:var(--red)">Failures</div><div class="death-circles">'+[0,1,2].map(i=>'<div class="death-circle '+(i<c.deathFailures?'failure':'')+'" onclick="toggleDeathSave(\'failure\','+i+')">'+(i<c.deathFailures?'&#10007;':'')+'</div>').join('')+'</div></div>'+(c.isDead?'<div style="font-size:13px;font-weight:500;color:var(--red);margin-top:8px">&#10007; Character has died.</div>':c.isStable?'<div style="font-size:13px;font-weight:500;color:var(--green);margin-top:8px">&#10003; Stable</div>':c.hp===0?'<div style="font-size:13px;color:var(--orange);margin-top:8px">&#9888; At 0 HP - roll death saves</div>':'')+'<div class="death-note">3 successes = stable. 3 failures = death. Natural 20 = regain 1 HP.</div></div><div class="sec-hdr"><span class="sec-title">Conditions</span></div><div class="cond-wrap"><div class="cond-grid">'+CONDITIONS.map(cn=>'<button class="cond-btn '+((c.conditions||[]).includes(cn)?'on':'')+'" onclick="toggleCond(\''+cn+'\')">'+cn+'</button>').join('')+'</div></div><div class="sec-hdr"><span class="sec-title">Currency</span></div><div class="currency-row">'+[['PP','pp'],['GP','gp'],['EP','ep'],['SP','sp'],['CP','cp']].map(([lbl,key])=>'<div class="currency-cell">'+(S.editMode?'<input class="currency-input" type="number" min="0" value="'+(c[key]||0)+'" oninput="S.myChar[\''+key+'\']=Math.max(0,+this.value||0)">':'<div class="currency-val">'+(c[key]||0)+'</div>')+'<div class="currency-lbl">'+lbl+'</div></div>').join('')+'</div></div>';}

function sheetSaves(c){let html='<div class="legend"><div class="leg-i"><div class="leg-dot" style="background:var(--purple)"></div>Proficient</div></div><div style="padding:8px 14px;background:var(--white);border:1px solid var(--border);border-top:none;border-bottom:1px solid var(--border);display:flex;justify-content:space-between"><span class="sec-title">Saving Throws</span><span class="muted">Prof +'+profB(c.level)+'</span></div><div class="tbl-wrap">';['STR','DEX','CON','INT','WIS','CHA'].forEach(ab=>{const isPr=c.saveProficiencies&&c.saveProficiencies.includes(ab);const isOv=c.saveOverrides&&c.saveOverrides[ab]!==undefined;const bonus=saveBonus(c,ab);html+='<div class="tbl-row">'+(S.editMode?'<input type="checkbox" class="prof-check" '+(isPr?'checked':'')+' onchange="toggleSaveProf(\''+ab+'\',this.checked)">':'<div class="prof-dot '+(isPr?'on':'')+'"></div>')+'<div class="tbl-name">'+ABFULL[S2AB[ab]]+'</div><div class="tbl-ab">'+ab+'</div>'+(S.editMode?'<input class="ov-input" type="number" value="'+(isOv?c.saveOverrides[ab]:bonus)+'" onchange="setSaveOv(\''+ab+'\',this.value)">'+(isOv?'<button class="reset-btn" onclick="clearSaveOv(\''+ab+'\')">reset</button>':''):'<div class="tbl-bonus '+(isPr?'prof':bonus<0?'neg':'')+'">'+fmtB(bonus)+'</div>')+'</div>';});html+='</div>';return html;}

function sheetSkills(c){let html='<div class="legend"><div class="leg-i"><div class="leg-dot" style="background:var(--purple)"></div>Prof</div><div class="leg-i"><div class="leg-dot" style="background:var(--gold)"></div>Expertise</div></div><div class="sort-bar"><span class="muted" style="margin-right:4px;font-size:12px">Sort:</span><button class="sort-btn '+(S.sortAlpha?'':'on')+'" onclick="S.sortAlpha=false;render()">By Ability</button><button class="sort-btn '+(S.sortAlpha?'on':'')+'" onclick="S.sortAlpha=true;render()">A-Z</button></div><div class="tbl-wrap" style="border-top:none">';const rr=sk=>{const name=sk.name;const isPr=(c.skillProficiencies||[]).includes(name);const isEx=(c.skillExpertise||[]).includes(name);const isOv=(c.skillOverrides||{})[name]!==undefined;const bonus=skillBonus(c,name);return'<div class="tbl-row">'+(S.editMode?'<input type="checkbox" class="prof-check" '+(isPr||isEx?'checked':'')+' onchange="toggleSkillProf(\''+name+'\',this.checked)"><input type="checkbox" class="exp-check" '+(isEx?'checked':'')+' onchange="toggleSkillExp(\''+name+'\',this.checked)">':'<div class="prof-dot '+(isEx?'expert':isPr?'on':'')+'"></div><div style="width:4px"></div>')+'<div class="tbl-name '+(isEx?'expert':isPr?'prof':'')+'">'+name+'</div><div class="tbl-ab">'+sk.ab.toUpperCase()+'</div>'+(S.editMode?'<input class="ov-input" type="number" value="'+(isOv?(c.skillOverrides||{})[name]:bonus)+'" onchange="setSkillOv(\''+name+'\',this.value)">'+(isOv?'<button class="reset-btn" onclick="clearSkillOv(\''+name+'\')">reset</button>':''):'<div class="tbl-bonus '+(isEx?'expert':isPr?'prof':bonus<0?'neg':'')+'">'+fmtB(bonus)+'</div>')+'</div>';};if(S.sortAlpha)[...SKILL_LIST].sort((a,b)=>a.name.localeCompare(b.name)).forEach(sk=>{html+=rr(sk);});else SKILL_GROUPS.forEach(grp=>{html+='<div class="grp-hdr">'+grp.label+' ('+modStr(c[grp.ab])+')</div>';grp.skills.forEach(n=>{const sk=SKILL_LIST.find(s=>s.name===n);if(sk)html+=rr(sk);});});html+='</div>';return html;}

function sheetSpells(c){const slots=getSlots(c);const atk=spellAtk(c);const dc=spellDC(c);const spellAb=CLASSES[c.class]&&CLASSES[c.class].spellcasting;const charSpells=c.spells||[];let html='';if(spellAb){html+='<div style="display:flex;background:var(--white);border:1px solid var(--border);border-top:none"><div style="flex:1;padding:10px;text-align:center;border-right:1px solid var(--border)"><div style="font-size:18px;font-weight:700;color:var(--purple)">'+dc+'</div><div class="muted" style="font-size:11px;margin-top:2px">Save DC</div></div><div style="flex:1;padding:10px;text-align:center;border-right:1px solid var(--border)"><div style="font-size:18px;font-weight:700;color:var(--purple)">'+(atk>=0?'+':'')+atk+'</div><div class="muted" style="font-size:11px;margin-top:2px">Spell Attack</div></div><div style="flex:1;padding:10px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--purple)">'+spellAb+'</div><div class="muted" style="font-size:11px;margin-top:2px">Ability</div></div></div>';}else{html+='<div style="padding:12px 14px;background:var(--white);border:1px solid var(--border);border-top:none"><div class="muted">'+c.class+' does not have spellcasting. Add custom abilities below.</div></div>';}if(slots.length){html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--white);border:1px solid var(--border);border-top:none"><span class="sec-title">Spell Slots</span><button class="sec-act" onclick="resetSpellSlots()">Reset All</button></div><div class="spell-slot-grid">';slots.forEach((tot,i)=>{const used=(c.spellSlotsUsed||[])[i]||0;const avail=tot-used;const isEmpty=avail===0;html+='<div class="slot-cell"><div class="slot-lbl">'+SPELL_LVL_NAMES[i+1]+'</div><div style="display:flex;align-items:center;justify-content:center;gap:6px"><button class="btn-icon minus" style="width:22px;height:22px;font-size:13px" onclick="useSpellSlot('+i+')" '+(isEmpty?'disabled':'')+'>-</button><div style="font-size:20px;font-weight:700;color:'+(isEmpty?'var(--text3)':'var(--purple)')+'">'+avail+'</div><button class="btn-icon" style="width:22px;height:22px;font-size:13px" onclick="restoreSpellSlot('+i+')" '+(used===0?'disabled':'')+'>+</button></div><div class="slot-count">'+avail+'/'+tot+'</div></div>';});html+='</div>';}const byLvl={};charSpells.forEach(sp=>{const l=sp.level||0;if(!byLvl[l])byLvl[l]=[];byLvl[l].push(sp);});if(charSpells.length){Object.keys(byLvl).sort((a,b)=>+a-+b).forEach(l=>{html+='<div class="spell-lvl-hdr">'+(+l===0?'Cantrip':SPELL_LVL_NAMES[+l])+'<span style="color:var(--text3);font-weight:400;margin-left:4px">('+byLvl[l].length+')</span></div>';byLvl[l].forEach(sp=>{const dur=fmtDur(sp.duration||'');const dmg=getDmgDice(sp.desc||'');const esc=sp.name.replace(/"/g,'&quot;').replace(/'/g,'&#39;');html+='<div class="spell-row" onclick="openSpellDetail(\''+esc+'\')">'+'<div style="flex:1"><div class="spell-name">'+sp.name+(sp.concentration?'<span class="conc-badge">C</span>':'')+(sp.ritual?'<span class="ritual-badge">R</span>':'')+'</div>'+'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:2px"><span style="font-size:11px;color:var(--text3)">'+sp.school+'</span>'+(sp.castTime?'<span style="font-size:11px;color:var(--text3)">&bull; '+sp.castTime+'</span>':'')+(dur?'<span style="font-size:11px;color:var(--teal2)">&bull; '+dur+'</span>':'')+(dmg?'<span style="font-size:11px;color:var(--red);font-weight:600">&bull; '+dmg+'</span>':'')+'</div></div><div style="font-size:11px;color:var(--text3);min-width:50px;text-align:right">'+(sp.range||'')+'</div>'+(S.editMode?'<button class="btn-icon" style="width:22px;height:22px;font-size:11px" onclick="event.stopPropagation();removeSpell(\''+esc+'\')">x</button>':'')+'</div>';});});}else{html+='<div style="padding:20px 14px;text-align:center;color:var(--text3);background:var(--white);border:1px solid var(--border);border-top:none;font-size:13px">No spells added yet.</div>';}html+='<div style="background:var(--white);border:1px solid var(--border);border-top:none;padding:10px 14px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">'+charSpells.length+' spell'+(charSpells.length!==1?'s':'')+'</span><div class="add-dropdown-wrap"><button class="add-dropdown-btn" onclick="openAddDropdown(\'spell-add-menu\')">+ Add &#9662;</button><div class="add-dropdown-menu" id="spell-add-menu"><div class="add-dropdown-item" onclick="this.closest(\'.add-dropdown-menu\').classList.remove(\'open\');openDbModal(\'spell\',\'db\')">+ Add from database</div><div class="add-dropdown-item" onclick="this.closest(\'.add-dropdown-menu\').classList.remove(\'open\');openDbModal(\'spell\',\'custom\')">+ Add custom spell</div></div></div></div>';return html;}

function sheetWeapons(c){const cw=c.weapons||[];let html='';if(cw.length){cw.forEach(wname=>{const custom=c.customWeapons&&c.customWeapons.find(x=>x.name===wname);if(custom){const atk=custom.atkBonus!==null&&custom.atkBonus!==''?+custom.atkBonus:0;html+='<div class="weapon-row"><div style="display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-size:15px;font-weight:500">'+custom.name+' <span style="font-size:11px;color:var(--text3)">Custom</span></div><div style="font-size:12px;color:var(--text3);margin-top:2px">'+custom.damage+' '+custom.damageType+(custom.range?' &bull; '+custom.range:'')+'</div></div><div style="text-align:center;min-width:48px"><div style="font-size:18px;font-weight:700;color:var(--purple)">'+fmtB(atk)+'</div><div style="font-size:10px;color:var(--text3)">Attack</div></div>'+(S.editMode?'<button class="btn-icon" style="width:24px;height:24px;font-size:11px" onclick="removeWeapon(\''+custom.name.replace(/'/g,"\\'")+'\')">x</button>':'')+'</div></div>';return;}const w=WEAPON_DB.find(x=>x.name===wname);if(!w)return;const atk=wAtkBonus(c,w);const dmgB=wDmgBonus(c,w);const fin=isFinesse(w);const fk=S.weaponFinesseChoice[w.name]||'str';const esc=w.name.replace(/"/g,'&quot;').replace(/'/g,'&#39;');html+='<div class="weapon-row" onclick="openWeaponDetail(\''+esc+'\')">'+'<div style="display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-size:15px;font-weight:500">'+w.name+(isProfWeapon(c,w)?'':'<span style="font-size:11px;color:var(--orange)"> (not prof.)</span>')+'</div><div style="font-size:12px;color:var(--text3);margin-top:2px">'+w.category+' &bull; '+w.damage+' '+w.damageType+(w.range?' &bull; '+w.range:'')+'</div>'+(fin?'<div style="margin-top:6px;display:flex;gap:6px;align-items:center" onclick="event.stopPropagation()"><span style="font-size:11px;color:var(--text3)">Using:</span><button onclick="setFinesseChoice(\''+esc+'\',\'str\')" style="padding:2px 8px;font-size:11px;border-radius:2px;border:1px solid var(--border2);background:'+(fk==='str'?'var(--purple)':'var(--white)')+';color:'+(fk==='str'?'#fff':'var(--text2)')+';cursor:pointer;font-family:inherit">STR ('+modStr(c.str)+')</button><button onclick="setFinesseChoice(\''+esc+'\',\'dex\')" style="padding:2px 8px;font-size:11px;border-radius:2px;border:1px solid var(--border2);background:'+(fk==='dex'?'var(--purple)':'var(--white)')+';color:'+(fk==='dex'?'#fff':'var(--text2)')+';cursor:pointer;font-family:inherit">DEX ('+modStr(c.dex)+')</button></div>':'')+'</div><div style="text-align:center;min-width:52px"><div style="font-size:18px;font-weight:700;color:var(--purple)">'+fmtB(atk)+'</div><div style="font-size:10px;color:var(--text3)">Attack</div></div><div style="text-align:center;min-width:52px;border-left:1px solid var(--border);padding-left:10px"><div style="font-size:15px;font-weight:700;color:var(--red)">'+w.damage+(dmgB!==0?fmtB(dmgB):'')+'</div><div style="font-size:10px;color:var(--text3)">'+w.damageType+'</div></div>'+(S.editMode?'<button class="btn-icon" style="width:24px;height:24px;font-size:11px" onclick="event.stopPropagation();removeWeapon(\''+esc+'\')">x</button>':'')+'</div>'+(w.versatile?'<div style="font-size:12px;color:var(--teal2);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">Versatile: '+w.versatile+' '+w.damageType+(dmgB!==0?fmtB(dmgB):'')+'</div>':'')+'</div>';});}else{html+='<div style="padding:24px 14px;text-align:center;color:var(--text3);background:var(--white);border:1px solid var(--border);border-top:none;font-size:13px">No weapons added yet.</div>';}html+='<div style="background:var(--white);border:1px solid var(--border);border-top:none;padding:10px 14px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">'+cw.length+' weapon'+(cw.length!==1?'s':'')+'</span><div class="add-dropdown-wrap"><button class="add-dropdown-btn" onclick="openAddDropdown(\'weapon-add-menu\')">+ Add &#9662;</button><div class="add-dropdown-menu" id="weapon-add-menu"><div class="add-dropdown-item" onclick="this.closest(\'.add-dropdown-menu\').classList.remove(\'open\');openDbModal(\'weapon\',\'db\')">+ Add from database</div><div class="add-dropdown-item" onclick="this.closest(\'.add-dropdown-menu\').classList.remove(\'open\');openDbModal(\'weapon\',\'custom\')">+ Add custom weapon</div></div></div></div>';return html;}

function sheetGear(c){
  const inv=c.inventory||[];
  let html='<div style="background:var(--white);border:1px solid var(--border);border-top:none;padding:14px">'
    +'<div class="sec-hdr" style="padding-top:0"><span class="sec-title">Inventory</span></div>';
  if(inv.length){
    inv.forEach((it,i)=>{
      html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">'
        +'<div style="flex:1"><div style="font-size:14px;font-weight:500">'+it.name+'</div>'
        +(it.desc?'<div style="font-size:12px;color:var(--text3);margin-top:1px">'+it.desc+'</div>':'')
        +'</div>'
        +'<div style="display:flex;gap:8px;align-items:center;margin-left:10px">'
        +(it.cost&&it.cost!=='--'?'<span style="font-size:12px;color:var(--gold);font-weight:500">'+it.cost+'</span>':'')
        +'<span class="muted">x'+it.qty+'</span>'
        +(S.editMode?'<button class="btn-icon" style="width:22px;height:22px;font-size:11px" onclick="S.myChar.inventory.splice('+i+',1);render()">x</button>':'')
        +'</div></div>';
    });
  }else{

    +'<div class="add-dropdown-wrap"><button class="add-dropdown-btn" onclick="openAddDropdown(\'gear-add-menu\')">+ Add &#9662;</button>'
    +'<div class="add-dropdown-menu" id="gear-add-menu">'

    +'<div class="add-dropdown-item" onclick="closeAllDropdowns();toggleCustomGearForm()">+ Add custom item</div>'
    +'</div></div></div>'
    +'<div id="custom-gear-form" style="display:none;background:var(--white);border:1px solid var(--border);border-top:none;padding:12px 14px">'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">'
    +'<input id="inv-name" placeholder="Item name" style="flex:2;min-width:120px;border:1px solid var(--border2);padding:7px;font-size:14px;font-family:inherit;border-radius:2px;background:var(--white);color:var(--text);outline:none">'
    +'<input id="inv-qty" type="number" value="1" min="1" style="width:54px;border:1px solid var(--border2);padding:7px;font-size:14px;font-family:inherit;border-radius:2px;background:var(--white);color:var(--text);text-align:center;outline:none">'

function toggleCustomGearForm(){const el=document.getElementById('custom-gear-form');if(el)el.style.display=el.style.display==='none'?'block':'none';}
function openGearDb(){
  // Reuse db modal infrastructure but for gear
  S.dbModalType='gear';S.dbModalMode='db';S.dbModalFilter='All';S.dbModalQuery='';
  const overlay=document.getElementById('db-modal-overlay');if(overlay)overlay.classList.remove('hidden');
  const title=document.getElementById('db-modal-title');if(title)title.textContent='Add Item';
  const dbSec=document.getElementById('db-modal-db-section');
  const cusSec=document.getElementById('db-modal-custom-section');
  if(dbSec)dbSec.style.display='flex';
  if(cusSec)cusSec.style.display='none';
  buildGearDbFilters();
  renderGearDbList();
  const srch=document.getElementById('db-modal-search');
  if(srch){srch.value='';srch.oninput=()=>renderGearDbList();setTimeout(()=>srch.focus(),100);}
}
function buildGearDbFilters(){
  const fc=document.getElementById('db-modal-filters');if(!fc)return;
  const filters=['All',...GEAR_CATS];
  fc.innerHTML=filters.map(f=>{
    const on=S.dbModalFilter===f?'on':'';
    const safeF=f.replace(/"/g,'&quot;');
    return '<button class="db-modal-filter '+on+'" data-filter="'+safeF+'">'+f+'</button>';
  }).join('');
  fc.onclick=function(e){
    const btn=e.target.closest('button[data-filter]');
    if(!btn)return;
    S.dbModalFilter=btn.getAttribute('data-filter');
    buildGearDbFilters();
    renderGearDbList();
  };
}
function renderGearDbList(){
  const list=document.getElementById('db-modal-list');if(!list)return;
  const srch=document.getElementById('db-modal-search');
  const q=(srch?srch.value:'').toLowerCase();
  const f=S.dbModalFilter||'All';
  const c=S.myChar;
  const added=(c&&c.inventory||[]).map(i=>i.name);
  const items=GEAR_DB.filter(it=>{
    const mQ=!q||it.name.toLowerCase().includes(q)||it.category.toLowerCase().includes(q)||(it.desc&&it.desc.toLowerCase().includes(q));
    const mF=f==='All'||it.category===f;
    return mQ&&mF;
  });
  if(!items.length){list.innerHTML='<div style="padding:32px;text-align:center;color:var(--text3);font-size:13px">No items found</div>';return;}
  let lastCat='';let html='';
  items.forEach(it=>{
    const isA=added.includes(it.name);
    const safeN=it.name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    if(it.category!==lastCat){html+='<div class="db-modal-cat">'+it.category+'</div>';lastCat=it.category;}
    html+='<div class="db-modal-row '+(isA?'added':'')+'" data-gearname="'+safeN+'">'
      +'<div style="flex:1"><div class="db-modal-row-name">'+it.name+'</div>'
      +'<div class="db-modal-row-sub">'+it.cost+(it.weight&&it.weight!=='0 lb'?' &bull; '+it.weight:'')+'</div></div>'
      +'<div class="db-modal-row-add">'+(isA?'Added':'+ Add')+'</div></div>';
  });
  list.innerHTML=html;
  list.onclick=function(e){
    const row=e.target.closest('[data-gearname]');if(!row)return;
    const name=row.getAttribute('data-gearname').replace(/&quot;/g,'"').replace(/&amp;/g,'&');
    openGearDetailDb(name);
  };
}
function openGearDetailDb(name){
  const it=GEAR_DB.find(x=>x.name===name);if(!it)return;
  const c=S.myChar;
  const isAdded=c&&(c.inventory||[]).find(x=>x.name===name);
  const body='<div style="margin-bottom:10px"><div style="font-size:17px;font-weight:600;margin-bottom:4px">'+it.name+'</div>'
    +'<div style="font-size:13px;color:var(--text3);margin-bottom:12px">'+it.category+'</div></div>'
    +'<div class="spell-detail-grid">'
    +'<div class="spell-detail-item"><div class="spell-detail-lbl">Cost</div><div class="spell-detail-val">'+it.cost+'</div></div>'
    +'<div class="spell-detail-item"><div class="spell-detail-lbl">Weight</div><div class="spell-detail-val">'+it.weight+'</div></div>'
    +'</div>'
    +'<div style="font-size:14px;line-height:1.6;color:var(--text2);margin-top:8px">'+it.desc+'</div>'
    +(isAdded
      ?'<div style="padding:8px 10px;background:var(--teal-light);border-radius:2px;font-size:13px;color:var(--teal2);margin-top:8px">Already in inventory</div>'
      :'<button id="db-add-gear-btn" style="width:100%;padding:11px;background:var(--teal);color:#fff;border:none;border-radius:2px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px">+ Add to Inventory</button>'
    );
  openModal(it.name,'',body,'Close',()=>{},true);
  setTimeout(()=>{
    const btn=document.getElementById('db-add-gear-btn');
    if(btn)btn.onclick=function(){
      const c=S.myChar;c.inventory=c.inventory||[];
      if(!c.inventory.find(x=>x.name===name)){
        c.inventory.push({name:it.name,qty:1,cost:it.cost,desc:it.desc});
        toast(it.name+' added');
      }else{toast('Already in inventory');}
      closeModal();renderGearDbList();render();
    };
  },50);
}


function adjHP(dir){const c=S.myChar;if(!c)return;const amt=+(document.getElementById('hp-amt')&&document.getElementById('hp-amt').value)||1;if(dir<0){let dmg=amt;if(c.tempHp>0){const abs=Math.min(c.tempHp,dmg);c.tempHp-=abs;dmg-=abs;}c.hp=Math.max(0,c.hp-dmg);if(c.hp===0&&!c.isStable){c.deathSuccesses=0;c.deathFailures=0;}}else{c.hp=Math.min(c.maxHp,c.hp+amt);if(c.hp>0){c.deathSuccesses=0;c.deathFailures=0;c.isStable=false;c.isDead=false;}}const p=pid(c.name);if(S.players[p])S.players[p].hp=c.hp;render();toast(dir>0?'+'+amt+' healing':'-'+amt+' damage');}
function dsClick(el){toggleDeathSave(el.getAttribute('data-type'),+el.getAttribute('data-idx'));}
function toggleDeathSave(type,index){const c=S.myChar;if(c.hp>0||c.isStable||c.isDead)return;if(type==='success')c.deathSuccesses=c.deathSuccesses>index?index:index+1;else c.deathFailures=c.deathFailures>index?index:index+1;if(c.deathFailures>=3){c.isDead=true;toast('Character has died.');}else if(c.deathSuccesses>=3){c.isStable=true;toast('Stable!');}render();}
function toggleCond(cn){const c=S.myChar;c.conditions=c.conditions||[];const i=c.conditions.indexOf(cn);if(i>=0)c.conditions.splice(i,1);else c.conditions.push(cn);render();toast(i>=0?cn+' removed':cn+' applied');}
function addInv(){const n=(document.getElementById('inv-name')&&document.getElementById('inv-name').value||'').trim();if(!n)return;const q=+(document.getElementById('inv-qty')&&document.getElementById('inv-qty').value)||1;const ex=(S.myChar.inventory||[]).find(i=>i.name===n);if(ex)ex.qty+=q;else{S.myChar.inventory=S.myChar.inventory||[];S.myChar.inventory.push({name:n,qty:q});}render();}
function toggleSaveProf(ab,checked){const c=S.myChar;c.saveProficiencies=c.saveProficiencies||[];if(checked){if(!c.saveProficiencies.includes(ab))c.saveProficiencies.push(ab);}else{c.saveProficiencies=c.saveProficiencies.filter(s=>s!==ab);}delete(c.saveOverrides||{})[ab];render();}
function setSaveOv(ab,val){S.myChar.saveOverrides=S.myChar.saveOverrides||{};if(val==='')delete S.myChar.saveOverrides[ab];else S.myChar.saveOverrides[ab]=parseInt(val)||0;render();}
function clearSaveOv(ab){delete(S.myChar.saveOverrides||{})[ab];render();}
function toggleSkillProf(name,checked){const c=S.myChar;c.skillProficiencies=c.skillProficiencies||[];if(checked){if(!c.skillProficiencies.includes(name))c.skillProficiencies.push(name);}else{c.skillProficiencies=c.skillProficiencies.filter(s=>s!==name);c.skillExpertise=(c.skillExpertise||[]).filter(s=>s!==name);}delete(c.skillOverrides||{})[name];render();}
function toggleSkillExp(name,checked){const c=S.myChar;c.skillExpertise=c.skillExpertise||[];if(checked){if(!(c.skillProficiencies||[]).includes(name)){c.skillProficiencies=c.skillProficiencies||[];c.skillProficiencies.push(name);}if(!c.skillExpertise.includes(name))c.skillExpertise.push(name);}else{c.skillExpertise=c.skillExpertise.filter(s=>s!==name);}delete(c.skillOverrides||{})[name];render();}
function setSkillOv(name,val){S.myChar.skillOverrides=S.myChar.skillOverrides||{};if(val==='')delete S.myChar.skillOverrides[name];else S.myChar.skillOverrides[name]=parseInt(val)||0;render();}
function clearSkillOv(name){delete(S.myChar.skillOverrides||{})[name];render();}

// ===== DM =====
function rDMStart(){return hdr('Dungeon Master','&#8592;',"go('landing')")+'<div class="scr on"><div class="f mt8"><label>Campaign Name (optional)</label><input id="camp-name" placeholder="e.g. The Lost Mine"></div><button class="btn btn-primary" onclick="startSession()">Start Session</button></div>';}
function startSession(){S.session=(['SWORD','TORCH','RAVEN','STORM','EMBER','FROST','BLADE','FLAME'])[Math.floor(Math.random()*8)];S.role='dm';S.campName=(document.getElementById('camp-name')&&document.getElementById('camp-name').value)||'Session';go('dm-dash');}
function rDMDash(){const tabs=['players','combat','shop','notes'];const lbls={players:'Players',combat:'Combat',shop:'Shop',notes:'Notes'};let body='';if(S.dmTab==='players')body=dmPlayers();else if(S.dmTab==='combat')body=dmCombat();else if(S.dmTab==='shop')body=dmShop();else if(S.dmTab==='notes')body=dmNotes();return '<div class="hdr"><div style="font-size:13px;opacity:.9">'+S.campName+'</div><div class="hdr-title" style="font-size:13px;letter-spacing:3px">'+S.session+'</div><button class="hdr-btn" onclick="endSession()">End</button></div><div style="max-width:600px;margin:0 auto"><div style="background:var(--white);border:1px solid var(--border)"><div class="tabs">'+tabs.map(t=>'<div class="tab '+(S.dmTab===t?'on':'')+'" onclick="S.dmTab=\''+t+'\';render()">'+lbls[t]+'</div>').join('')+'</div></div><div style="padding-bottom:80px">'+body+'</div></div>';}
function dmPlayers(){const pids=Object.keys(S.players);if(!pids.length)return '<div class="waiting"><h3>Waiting for players...</h3><p>Share code <b>'+S.session+'</b></p></div>';return pids.map(p=>{const pl=S.players[p];const pct=Math.max(0,pl.hp/pl.maxHp);return'<div class="pc"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:15px;font-weight:600">'+pl.name+'</div><div class="muted" style="margin:2px 0 8px">'+(pl.race||'')+' '+(pl.class||'')+' &middot; Lvl '+(pl.level||1)+'</div></div><div style="text-align:right"><div style="font-size:18px;font-weight:700;color:'+hpCol(pct)+'">'+pl.hp+'/'+pl.maxHp+'</div><div class="muted">HP</div></div></div><div class="hp-track" style="margin:8px 0"><div class="hp-fill" style="width:'+Math.round(pct*100)+'%;background:'+hpCol(pct)+'"></div></div><div style="display:flex;gap:8px;align-items:center"><button class="btn-icon minus" onclick="dmAdj(\''+p+'\',-1)">-</button><input type="number" id="da-'+p+'" value="1" min="0" style="width:48px;border:1px solid var(--border2);padding:5px;text-align:center;font-family:inherit;border-radius:2px;background:var(--white);color:var(--text)"><button class="btn-icon" onclick="dmAdj(\''+p+'\',1)">+</button><span style="flex:1"></span><span class="muted">AC '+(pl.ac||10)+'</span>'+((pl.conditions||[]).length?'<span style="font-size:11px;background:#fde8e8;color:var(--red);padding:2px 7px;border-radius:2px">'+pl.conditions.join(', ')+'</span>':'')+'</div></div>';}).join('');}
function dmAdj(p,dir){const pl=S.players[p];if(!pl)return;const el=document.getElementById('da-'+p);const amt=el?+el.value||1:1;pl.hp=Math.max(0,Math.min(pl.maxHp,pl.hp+(dir*amt)));if(S.myChar&&S.myChar.name===pl.name)S.myChar.hp=pl.hp;S.initiative.forEach(c=>{if(c.name===pl.name)c.hp=pl.hp;});render();toast(pl.name+': '+(dir>0?'+':'')+dir*amt+' HP');}
function dmCombat(){const rows=!S.initiative.length?'<div class="waiting" style="border-top:none"><h3>No active combat</h3><p>Add enemies and press Start Combat</p></div>':S.initiative.map((c,i)=>{const pct=Math.max(0,c.hp/c.maxHp);const act=i===S.currentTurn&&S.combatActive;return'<div class="init-item'+(act?' active-turn':'')+(c.hp<=0?' dead':'')+'"><div class="init-roll">'+c.roll+'</div><div style="flex:1"><div class="init-name">'+c.name+(c.type==='enemy'?'<span class="enemy-badge">ENEMY</span>':'')+'</div><div class="mini-bar"><div class="mini-fill" style="width:'+Math.round(pct*100)+'%;background:'+hpCol(pct)+'"></div></div></div><div style="font-size:13px;color:var(--text3);white-space:nowrap">'+c.hp+'/'+c.maxHp+'</div><div style="display:flex;gap:4px"><button class="btn-icon minus" style="width:26px;height:26px;font-size:14px" onclick="initAdj('+i+',-1)">-</button><button class="btn-icon" style="width:26px;height:26px;font-size:14px" onclick="initAdj('+i+',1)">+</button></div></div>';}).join('');return '<div style="background:var(--white);border:1px solid var(--border);border-top:none;padding:14px"><div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap"><button class="btn btn-sm btn-primary" onclick="startCombat()">Start Combat</button><button class="btn btn-sm" onclick="nextTurn()">Next Turn</button><button class="btn btn-sm btn-danger" onclick="endCombat()">End Combat</button></div><div class="sec-hdr" style="padding-top:0"><span class="sec-title">Add Enemy</span></div><div class="row3"><div class="f"><label>Name</label><input id="en-n" placeholder="Goblin"></div><div class="f"><label>HP</label><input id="en-h" type="number" value="20"></div><div class="f"><label>Initiative</label><input id="en-i" type="number" value="12"></div></div><button class="btn btn-sm btn-primary mb12" onclick="addEnemy()">Add Enemy</button></div>'+rows;}
function startCombat(){S.initiative=[];S.currentTurn=0;S.combatActive=true;Object.values(S.players).forEach(p=>{S.initiative.push({type:'player',name:p.name,hp:p.hp,maxHp:p.maxHp,roll:Math.floor(Math.random()*20)+1+(p.initiative||0)});});S.enemies.forEach(e=>{S.initiative.push({type:'enemy',name:e.name,hp:e.hp,maxHp:e.maxHp,roll:e.initiative});});S.initiative.sort((a,b)=>b.roll-a.roll);render();toast('Combat started!');}
function addEnemy(){const n=(document.getElementById('en-n')&&document.getElementById('en-n').value||'').trim();if(!n)return;const hp=+(document.getElementById('en-h')&&document.getElementById('en-h').value)||10;const init=+(document.getElementById('en-i')&&document.getElementById('en-i').value)||5;S.enemies.push({name:n,hp,maxHp:hp,initiative:init});if(document.getElementById('en-n'))document.getElementById('en-n').value='';render();toast(n+' added');}
function nextTurn(){if(!S.combatActive||!S.initiative.length)return;S.currentTurn=(S.currentTurn+1)%S.initiative.length;render();toast(S.initiative[S.currentTurn].name+"'s turn!");}
function endCombat(){S.combatActive=false;S.initiative=[];S.enemies=[];S.currentTurn=0;render();toast('Combat ended');}
function initAdj(i,dir){const c=S.initiative[i];if(!c)return;c.hp=Math.max(0,Math.min(c.maxHp,c.hp+dir));const p=pid(c.name);if(S.players[p])S.players[p].hp=c.hp;if(S.myChar&&S.myChar.name===c.name)S.myChar.hp=c.hp;render();}
function dmShop(){return '<div style="background:var(--white);border:1px solid var(--border);border-top:none;padding:14px"><div class="sec-hdr" style="padding-top:0"><span class="sec-title">Add Item</span></div><div class="f"><label>Name</label><input id="sh-n" placeholder="Potion of Healing"></div><div class="row2"><div class="f"><label>Price (GP)</label><input id="sh-p" type="number" value="50"></div><div class="f"><label>Category</label><select id="sh-c"><option>Potion</option><option>Weapon</option><option>Armor</option><option>Magic Item</option><option>Scroll</option><option>Misc</option></select></div></div><div class="f"><label>Description</label><input id="sh-d" placeholder="Short description..."></div><button class="btn btn-sm btn-primary mb12" onclick="addShopItem()">Add to Shop</button>'+(S.shopItems.length?S.shopItems.map((it,i)=>'<div class="shop-item" style="border-top:none"><div><div style="font-weight:500">'+it.name+'</div><div class="muted">'+it.category+(it.desc?' - '+it.desc:'')+'</div></div><div style="display:flex;gap:8px;align-items:center"><span style="font-weight:600;color:var(--gold)">'+it.price+' GP</span><button class="btn-icon" style="width:22px;height:22px;font-size:12px" onclick="S.shopItems.splice('+i+',1);render()">x</button></div></div>').join(''):'<div class="muted">No items yet.</div>')+'</div><div style="padding:14px;background:var(--white);border:1px solid var(--border);border-top:none"><button class="btn '+(S.shopOpen?'btn-danger':'')+'" onclick="S.shopOpen=!S.shopOpen;render();toast(\'Shop \'+(S.shopOpen?\'opened\':\'closed\'))">'+(S.shopOpen?'Close Shop':'Open Shop for Players')+'</button></div>';}
function addShopItem(){const n=(document.getElementById('sh-n')&&document.getElementById('sh-n').value||'').trim();if(!n)return;S.shopItems.push({name:n,price:+(document.getElementById('sh-p')&&document.getElementById('sh-p').value)||1,category:(document.getElementById('sh-c')&&document.getElementById('sh-c').value)||'Misc',desc:(document.getElementById('sh-d')&&document.getElementById('sh-d').value)||''});if(document.getElementById('sh-n'))document.getElementById('sh-n').value='';if(document.getElementById('sh-d'))document.getElementById('sh-d').value='';render();toast(n+' added');}
function dmNotes(){const pids=Object.keys(S.players);return '<div style="background:var(--white);border:1px solid var(--border);border-top:none;padding:14px"><div class="sec-hdr" style="padding-top:0"><span class="sec-title">Session Notes</span></div><textarea class="notes-area" oninput="S.notes=this.value" placeholder="Write session notes here...">'+S.notes+'</textarea><div class="sec-hdr mt12"><span class="sec-title">Give Item to Player</span></div><div class="f"><label>Player</label><select id="gv-p">'+(pids.length?pids.map(p=>'<option value="'+p+'">'+S.players[p].name+'</option>').join(''):'<option>No players</option>')+'</select></div><div class="row2"><div class="f"><label>Item</label><input id="gv-n" placeholder="Item name"></div><div class="f"><label>Qty</label><input id="gv-q" type="number" value="1"></div></div><button class="btn btn-sm btn-primary" onclick="giveItem()">Give Item</button></div>';}
function giveItem(){const p=(document.getElementById('gv-p')&&document.getElementById('gv-p').value)||'';const n=(document.getElementById('gv-n')&&document.getElementById('gv-n').value||'').trim();const q=+(document.getElementById('gv-q')&&document.getElementById('gv-q').value)||1;if(!p||!n){toast('Select player and enter item name');return;}const pl=S.players[p];if(!pl)return;pl.inventory=pl.inventory||[];const ex=pl.inventory.find(i=>i.name===n);if(ex)ex.qty+=q;else pl.inventory.push({name:n,qty:q});if(S.myChar&&S.myChar.name===pl.name)S.myChar.inventory=[...pl.inventory];if(document.getElementById('gv-n'))document.getElementById('gv-n').value='';render();toast(n+' given to '+pl.name+'!');}
function endSession(){if(!confirm('End session?'))return;Object.assign(S,{session:null,role:null,players:{},enemies:[],initiative:[],combatActive:false,campName:''});go('landing');}

// ===== DICE ROLLER =====
let diceCount=1;
let diceHistory=[];
function toggleDicePanel(){const p=document.getElementById('dice-panel');if(p)p.classList.toggle('hidden');}
function adjDiceCount(dir){diceCount=Math.max(1,Math.min(20,diceCount+dir));const el=document.getElementById('dice-count');if(el)el.textContent=diceCount;}
function rollDie(sides){
  const count=diceCount;
  const mod=+(document.getElementById('dice-mod')&&document.getElementById('dice-mod').value)||0;
  const rolls=[];
  for(let i=0;i<count;i++)rolls.push(Math.floor(Math.random()*sides)+1);
  const sum=rolls.reduce((a,b)=>a+b,0);
  const total=sum+mod;
  const isCrit=sides===20&&count===1&&rolls[0]===20;
  const isFail=sides===20&&count===1&&rolls[0]===1;
  const resultEl=document.getElementById('dice-result');
  if(resultEl){
    resultEl.innerHTML='<div class="dice-result-total" style="color:'+(isCrit?'var(--green)':isFail?'var(--red)':'var(--purple)')+'">'+total+(isCrit?' <span style="font-size:14px">CRIT!</span>':isFail?' <span style="font-size:14px">FAIL</span>':'')+'</div>'
      +'<div class="dice-result-detail">'+count+'d'+sides+(mod!==0?(mod>0?'+':'')+mod:'')+(count>1?' ('+rolls.join(', ')+'='+sum+')':'')+'</div>';
  }
  const entry=count+'d'+sides+(mod!==0?(mod>0?'+':'')+mod:'')+' = <b>'+total+'</b>'+(isCrit?' CRIT':isFail?' FAIL':'');
  diceHistory.unshift(entry);
  if(diceHistory.length>8)diceHistory.pop();
  const histEl=document.getElementById('dice-history');
  if(histEl)histEl.innerHTML=diceHistory.map(h=>'<div style="font-size:12px;color:var(--text2);padding:2px 0;border-bottom:1px solid var(--border)">'+h+'</div>').join('');
  // Animate the button
  const btn=event&&event.target&&event.target.closest('.die-btn');
  if(btn){btn.classList.add('rolling');setTimeout(()=>btn.classList.remove('rolling'),300);}
}
function rollCustom(){
  const sides=+prompt('How many sides? (e.g. 100)');
  if(!sides||sides<2)return;
  rollDie(sides);
}
function clearDiceHistory(){diceHistory=[];const el=document.getElementById('dice-history');if(el)el.innerHTML='';}
// Close dice panel when clicking outside
document.addEventListener('click',function(e){
  const panel=document.getElementById('dice-panel');
  const fab=document.getElementById('dice-fab');
  if(panel&&fab&&!panel.contains(e.target)&&!fab.contains(e.target)){
    panel.classList.add('hidden');
  }
});

render();

</script>
